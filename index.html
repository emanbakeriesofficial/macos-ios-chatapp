<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Apple Chat">
  <meta name="theme-color" content="#F5F5F7">
  <title>Apple Chat</title>
  
  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23007AFF'/><path d='M90 40c-8 0-15 3-20 8-4-5-11-8-19-8-14 0-26 12-26 27 0 18 16 33 45 58 29-25 45-40 45-58 0-15-12-27-26-27z' fill='white'/></svg>">
  
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --apple-blue: #007AFF;
      --apple-blue-hover: #0066D6;
      --apple-gray: #F5F5F7;
      --apple-dark: #1D1D1F;
      --apple-border: #E5E5EA;
      --bubble-sent: #007AFF;
      --bubble-received: #E9E9EB;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--apple-gray);
      color: var(--apple-dark);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Apple Logo Background */
    #apple-logo-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50vw;
      height: 50vw;
      max-width: 450px;
      max-height: 450px;
      opacity: 0.02;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.4s ease, transform 0.2s ease-out;
      will-change: transform;
    }

    #apple-logo-bg.glow {
      opacity: 0.06;
      filter: drop-shadow(0 0 40px rgba(0, 122, 255, 0.4));
    }

    /* Main Container */
    #app {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #FFFFFF;
      box-shadow: var(--shadow-lg);
    }

    /* Header */
    header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--apple-border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .device-badge {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(0, 122, 255, 0.1);
      color: var(--apple-blue);
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: var(--apple-gray);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      color: var(--apple-dark);
    }

    .icon-btn:hover {
      background: #E5E5EA;
      transform: translateY(-1px);
    }

    .icon-btn:active {
      transform: scale(0.92);
    }

    /* Project Selector */
    #project-selector {
      padding: 14px 24px;
      background: #FAFAFC;
      border-bottom: 1px solid var(--apple-border);
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    #project-selector::-webkit-scrollbar {
      display: none;
    }

    .project-chip {
      padding: 8px 18px;
      background: #FFFFFF;
      border: 1px solid var(--apple-border);
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .project-chip:hover {
      border-color: #C7C7CC;
    }

    .project-chip.active {
      background: var(--apple-blue);
      color: white;
      border-color: var(--apple-blue);
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
    }

    .project-chip.add-new {
      background: rgba(0, 122, 255, 0.08);
      color: var(--apple-blue);
      border-color: transparent;
      font-weight: 600;
      box-shadow: none;
    }

    .project-chip.add-new:hover {
      background: rgba(0, 122, 255, 0.15);
    }

    /* Chat Container */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Message Bubble */
    .message {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      animation: messageSlideIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    @keyframes messageSlideIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message.sent {
      flex-direction: row-reverse;
    }

    .message-bubble {
      max-width: 75%;
      padding: 10px 16px;
      border-radius: 20px;
      position: relative;
      word-wrap: break-word;
      font-size: 15.5px;
      line-height: 1.45;
      box-shadow: var(--shadow-sm);
    }

    .message.sent .message-bubble {
      background: var(--bubble-sent);
      color: white;
      border-bottom-right-radius: 4px; /* iMessage tail effect */
    }

    .message.received .message-bubble {
      background: var(--bubble-received);
      color: var(--apple-dark);
      border-bottom-left-radius: 4px; /* iMessage tail effect */
    }

    .message-text {
      white-space: pre-wrap;
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.6;
      justify-content: flex-end;
    }

    .message.received .message-meta {
      justify-content: flex-start;
      opacity: 0.5;
    }

    .copy-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: var(--apple-gray);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.2s ease;
      flex-shrink: 0;
      color: #86868B;
      margin-bottom: 20px;
    }

    .message:hover .copy-btn {
      opacity: 1;
    }

    .copy-btn:hover {
      background: #E5E5EA;
      color: #333;
    }

    /* Empty States */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #86868B;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    .empty-state svg {
      margin-bottom: 16px;
      opacity: 0.4;
      width: 56px;
      height: 56px;
    }

    .empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      max-width: 250px;
      line-height: 1.5;
    }

    /* Input Area */
    #input-area {
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--apple-border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    #message-input {
      flex: 1;
      border: 1px solid var(--apple-border);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 16px; /* Prevents iOS zoom */
      font-family: inherit;
      resize: none;
      max-height: 120px;
      background: #FAFAFC;
      transition: all 0.2s ease;
      line-height: 1.4;
    }

    #message-input:focus {
      outline: none;
      background: #FFFFFF;
      border-color: var(--apple-blue);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
    }

    #send-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--apple-blue);
      color: white;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) {
      background: var(--apple-blue-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
    }

    #send-btn:active:not(:disabled) {
      transform: scale(0.92);
    }

    #send-btn:disabled {
      background: #E5E5EA;
      color: #86868B;
      cursor: not-allowed;
    }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 24px;
      padding: 32px;
      max-width: 380px;
      width: 90%;
      box-shadow: var(--shadow-lg);
      animation: modalSlideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .modal-input {
      width: 100%;
      padding: 14px 16px;
      background: #FAFAFC;
      border: 1px solid var(--apple-border);
      border-radius: 14px;
      font-size: 16px;
      font-family: inherit;
      margin-bottom: 20px;
      transition: all 0.2s ease;
    }

    .modal-input:focus {
      outline: none;
      background: #FFFFFF;
      border-color: var(--apple-blue);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-btn.primary {
      background: var(--apple-blue);
      color: white;
    }

    .modal-btn.primary:disabled {
      background: #A1C6F5;
      cursor: not-allowed;
    }

    .modal-btn.secondary {
      background: var(--apple-gray);
      color: var(--apple-dark);
    }

    .modal-btn:hover:not(:disabled) {
      filter: brightness(0.95);
    }

    .modal-btn:active:not(:disabled) {
      transform: scale(0.96);
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: max(90px, env(safe-area-inset-bottom) + 90px);
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(29, 29, 31, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: white;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      z-index: 2000;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Loading State */
    .loading {
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(0, 122, 255, 0.2);
      border-top-color: var(--apple-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Share Code Display */
    .share-code-display {
      background: #FAFAFC;
      border: 1px solid var(--apple-border);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 24px;
      text-align: center;
    }

    .share-code-label {
      font-size: 13px;
      color: #86868B;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .share-code-value {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--apple-blue);
      font-family: 'SF Mono', 'Monaco', monospace;
    }

    @media (max-width: 600px) {
      .message-bubble { max-width: 85%; }
      header { padding: 12px 16px; }
      #chat-container { padding: 16px; }
    }
  </style>
</head>
<body>
  <!-- Apple Logo Background -->
  <svg id="apple-logo-bg" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
    <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z" fill="currentColor"/>
  </svg>

  <div id="app">
    <header>
      <div class="header-left">
        <div class="header-title">Messages</div>
        <span class="device-badge" id="device-badge">Loading...</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="share-btn" title="Share Project">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
            <polyline points="16 6 12 2 8 6"></polyline>
            <line x1="12" y1="2" x2="12" y2="15"></line>
          </svg>
        </button>
        <button class="icon-btn" id="settings-btn" title="Join Project">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5.5"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>
        </button>
      </div>
    </header>

    <div id="project-selector">
      <div class="project-chip add-new" id="add-project-btn">+ New Project</div>
    </div>

    <div id="chat-container">
      <div class="loading"><div class="spinner"></div></div>
    </div>

    <div id="input-area">
      <textarea id="message-input" placeholder="iMessage" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <!-- New Project Modal -->
  <div class="modal" id="new-project-modal">
    <div class="modal-content">
      <div class="modal-title">New Project</div>
      <input type="text" class="modal-input" id="project-name-input" placeholder="Project name" maxlength="50">
      <div class="modal-actions">
        <button class="modal-btn secondary" id="cancel-project-btn">Cancel</button>
        <button class="modal-btn primary" id="create-project-btn">Create</button>
      </div>
    </div>
  </div>

  <!-- Join Project Modal -->
  <div class="modal" id="join-project-modal">
    <div class="modal-content">
      <div class="modal-title">Join Project</div>
      <input type="text" class="modal-input" id="share-code-input" placeholder="Enter 6-digit code" maxlength="6" style="text-transform: uppercase;">
      <div class="modal-actions">
        <button class="modal-btn secondary" id="cancel-join-btn">Cancel</button>
        <button class="modal-btn primary" id="join-project-btn">Join</button>
      </div>
    </div>
  </div>

  <!-- Share Project Modal -->
  <div class="modal" id="share-project-modal">
    <div class="modal-content">
      <div class="modal-title">Share Project</div>
      <div class="share-code-display">
        <div class="share-code-label">Project Code</div>
        <div class="share-code-value" id="share-code-value">------</div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="close-share-btn">Close</button>
        <button class="modal-btn primary" id="copy-code-btn">Copy Code</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    // ============================================
    // CONFIGURATION - Replace with your Supabase credentials
    // ============================================
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================
    // STATE MANAGEMENT
    // ============================================
    let currentUser = null;
    let currentProject = null;
    let projects = [];
    let messages = [];
    let messageSubscription = null;

    // ============================================
    // UTILITIES
    // ============================================
    function detectDevice() {
      const ua = navigator.userAgent;
      if (/iPhone|iPad|iPod/.test(ua)) return 'ios_user';
      if (/Macintosh|MacIntel/.test(ua)) return 'macos_user';
      return 'macos_user';
    }

    function getDeviceId() {
      let deviceId = localStorage.getItem('device_id');
      if (!deviceId) {
        deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
        localStorage.setItem('device_id', deviceId);
      }
      return deviceId;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function showModal(modalId) { document.getElementById(modalId).classList.add('active'); }
    function hideModal(modalId) { document.getElementById(modalId).classList.remove('active'); }
    function generateShareCode() { return Math.random().toString(36).substr(2, 6).toUpperCase(); }

    function initAppleLogoEffects() {
      const logo = document.getElementById('apple-logo-bg');
      const chatContainer = document.getElementById('chat-container');

      chatContainer.addEventListener('scroll', () => {
        const scrollable = chatContainer.scrollHeight - chatContainer.clientHeight;
        if (scrollable > 0) {
          const scrollPercent = chatContainer.scrollTop / scrollable;
          logo.style.transform = `translate(-50%, calc(-50% + ${scrollPercent * 25}px))`;
        }
      });
    }

    function glowLogo() {
      const logo = document.getElementById('apple-logo-bg');
      logo.classList.add('glow');
      setTimeout(() => logo.classList.remove('glow'), 1000);
    }

    // ============================================
    // DATABASE OPERATIONS
    // ============================================
    async function initUser() {
      const deviceId = getDeviceId();
      const deviceType = detectDevice();

      const {  existingUser } = await supabase
        .from('users')
        .select('*')
        .eq('device_id', deviceId)
        .single();

      if (existingUser) {
        currentUser = existingUser;
      } else {
        const {  newUser, error } = await supabase
          .from('users')
          .insert([{ device_id: deviceId, device_type: deviceType }])
          .select()
          .single();

        if (error) {
          console.error('Error creating user:', error);
          showToast('Error initializing user');
          return;
        }
        currentUser = newUser;
      }

      document.getElementById('device-badge').textContent = deviceType === 'ios_user' ? 'iOS' : 'macOS';
    }

    async function loadProjects() {
      const { data, error } = await supabase
        .from('projects')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error loading projects:', error);
        return;
      }

      projects = data || [];
      renderProjects();

      const lastProjectId = localStorage.getItem('last_project_id');
      if (lastProjectId && projects.find(p => p.id === lastProjectId)) {
        await selectProject(lastProjectId);
      } else if (projects.length > 0) {
        await selectProject(projects[0].id);
      } else {
        showEmptyProjectsState();
      }
    }

    function showEmptyProjectsState() {
      const container = document.getElementById('chat-container');
      container.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
          <h3>No Projects Yet</h3>
          <p>Create a new project or join an existing one to begin chatting.</p>
        </div>
      `;
    }

    function renderProjects() {
      const container = document.getElementById('project-selector');
      const addBtn = document.getElementById('add-project-btn');
      
      container.querySelectorAll('.project-chip:not(.add-new)').forEach(chip => chip.remove());

      projects.forEach(project => {
        const chip = document.createElement('div');
        chip.className = 'project-chip';
        chip.textContent = project.name;
        chip.dataset.projectId = project.id;
        chip.addEventListener('click', () => selectProject(project.id));
        container.insertBefore(chip, addBtn);
      });
    }

    async function createProject(name) {
      const shareCode = generateShareCode();

      // Bug Fix 1: Added .select() so we return the generated row, and we handle exceptions.
      const { data, error } = await supabase
        .from('projects')
        .insert([{
          name: name.trim(),
          user_id: currentUser.id,
          share_code: shareCode
        }])
        .select()
        .single();

      if (error) throw error;

      projects.unshift(data);
      renderProjects();
      await selectProject(data.id);
      showToast('Project created!');
    }

    async function joinProject(shareCode) {
      const {  project, error: findError } = await supabase
        .from('projects')
        .select('*')
        .eq('share_code', shareCode.toUpperCase())
        .single();

      if (findError || !project) throw new Error('Project not found');

      if (projects.find(p => p.share_code === project.share_code)) {
        await selectProject(project.id);
        throw new Error('Already in this project');
      }

      const {  newProject, error: joinError } = await supabase
        .from('projects')
        .insert([{
          name: project.name,
          user_id: currentUser.id,
          share_code: project.share_code
        }])
        .select()
        .single();

      if (joinError) throw joinError;

      projects.unshift(newProject);
      renderProjects();
      await selectProject(newProject.id);
      showToast('Joined project!');
    }

    async function selectProject(projectId) {
      currentProject = projects.find(p => p.id === projectId);
      if (!currentProject) return;

      document.querySelectorAll('.project-chip').forEach(chip => {
        chip.classList.toggle('active', chip.dataset.projectId === projectId);
      });

      localStorage.setItem('last_project_id', projectId);

      if (messageSubscription) messageSubscription.unsubscribe();

      await loadMessages();
      subscribeToMessages();
    }

    async function loadMessages() {
      const chatContainer = document.getElementById('chat-container');
      chatContainer.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .eq('share_code', currentProject.share_code)
        .order('created_at', { ascending: true });

      if (error) {
        chatContainer.innerHTML = '<div class="empty-state">Error loading messages</div>';
        return;
      }

      messages = data || [];
      renderMessages();
    }

    function renderMessages() {
      const chatContainer = document.getElementById('chat-container');
      chatContainer.innerHTML = '';

      if (messages.length === 0) {
        chatContainer.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <h3>It's quiet here</h3>
            <p>Send a message to start the conversation.</p>
          </div>
        `;
        return;
      }

      messages.forEach(msg => {
        chatContainer.appendChild(createMessageElement(msg));
      });
      scrollToBottom();
    }

    function createMessageElement(msg) {
      const isSent = msg.user_id === currentUser.id;
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';

      const text = document.createElement('div');
      text.className = 'message-text';
      text.textContent = msg.content;

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = new Date(msg.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

      bubble.appendChild(text);
      bubble.appendChild(meta);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(msg.content);
        showToast('Copied!');
      });

      messageDiv.appendChild(bubble);
      messageDiv.appendChild(copyBtn);

      return messageDiv;
    }

    function subscribeToMessages() {
      messageSubscription = supabase
        .channel(`messages:${currentProject.share_code}`)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: `share_code=eq.${currentProject.share_code}`
        }, (payload) => {
          const newMessage = payload.new;
          
          // Prevent duplicates if optimistic UI already added it
          if (!messages.find(m => m.id === newMessage.id)) {
            messages.push(newMessage);
            const chatContainer = document.getElementById('chat-container');
            const emptyState = chatContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            chatContainer.appendChild(createMessageElement(newMessage));
            scrollToBottom();
            glowLogo();
          }
        })
        .subscribe();
    }

    async function sendMessage(content) {
      if (!content || content.trim().length === 0) return;
      if (!currentProject) { showToast('Please select a project first'); return; }

      const input = document.getElementById('message-input');
      const sendBtn = document.getElementById('send-btn');
      
      // Bug Fix 2: Reset UI and disable button optimistically.
      input.value = '';
      input.style.height = 'auto'; 
      sendBtn.disabled = true;

      // Ensure we request the inserted row using .select().single()
      const { data, error } = await supabase
        .from('messages')
        .insert([{
          content: content.trim(),
          user_id: currentUser.id,
          share_code: currentProject.share_code
        }])
        .select()
        .single();

      if (error) {
        console.error('Error sending message:', error);
        showToast('Error sending message');
        // Revert UI on failure
        input.value = content;
        sendBtn.disabled = false;
        return;
      }

      // Optimistic Update: Append instantly if realtime channel hasn't caught it yet
      if (data && !messages.find(m => m.id === data.id)) {
        messages.push(data);
        const chatContainer = document.getElementById('chat-container');
        const emptyState = chatContainer.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        chatContainer.appendChild(createMessageElement(data));
        scrollToBottom();
      }
    }

    function scrollToBottom() {
      const chatContainer = document.getElementById('chat-container');
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================
    function updateSendButton() {
      const input = document.getElementById('message-input');
      document.getElementById('send-btn').disabled = input.value.trim().length === 0;
    }

    document.getElementById('message-input').addEventListener('input', (e) => {
      updateSendButton();
      // Auto-resize textarea seamlessly
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
    });

    document.getElementById('message-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(e.target.value);
      }
    });

    document.getElementById('send-btn').addEventListener('click', () => {
      sendMessage(document.getElementById('message-input').value);
    });

    // Modals
    document.getElementById('add-project-btn').addEventListener('click', () => {
      showModal('new-project-modal');
      setTimeout(() => document.getElementById('project-name-input').focus(), 100);
    });

    document.getElementById('cancel-project-btn').addEventListener('click', () => {
      hideModal('new-project-modal');
      document.getElementById('project-name-input').value = '';
    });

    // Fixed Create Project logic
    document.getElementById('create-project-btn').addEventListener('click', async () => {
      const input = document.getElementById('project-name-input');
      const btn = document.getElementById('create-project-btn');
      
      if (!input.value.trim()) { showToast('Project name required'); return; }
      
      try {
        btn.disabled = true;
        btn.textContent = 'Creating...';
        await createProject(input.value);
        
        hideModal('new-project-modal');
        input.value = '';
      } catch (error) {
        showToast(error.message || 'Error creating project');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create';
      }
    });

    document.getElementById('settings-btn').addEventListener('click', () => {
      showModal('join-project-modal');
      setTimeout(() => document.getElementById('share-code-input').focus(), 100);
    });

    document.getElementById('cancel-join-btn').addEventListener('click', () => {
      hideModal('join-project-modal');
      document.getElementById('share-code-input').value = '';
    });

    // Fixed Join Project Logic
    document.getElementById('join-project-btn').addEventListener('click', async () => {
      const input = document.getElementById('share-code-input');
      const btn = document.getElementById('join-project-btn');
      
      if (input.value.trim().length !== 6) { showToast('Invalid 6-digit code'); return; }
      
      try {
        btn.disabled = true;
        btn.textContent = 'Joining...';
        await joinProject(input.value);
        
        hideModal('join-project-modal');
        input.value = '';
      } catch (error) {
        showToast(error.message || 'Error joining project');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Join';
      }
    });

    document.getElementById('share-btn').addEventListener('click', () => {
      if (!currentProject) { showToast('Select a project first'); return; }
      document.getElementById('share-code-value').textContent = currentProject.share_code;
      showModal('share-project-modal');
    });

    document.getElementById('close-share-btn').addEventListener('click', () => hideModal('share-project-modal'));

    document.getElementById('copy-code-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(currentProject.share_code);
      showToast('Code copied to clipboard!');
    });

    // Close Modals on background click
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) hideModal(modal.id);
      });
    });

    // ============================================
    // APP INITIALIZATION
    // ============================================
    async function init() {
      try {
        await initUser();
        await loadProjects();
        initAppleLogoEffects();
      } catch (error) {
        console.error('Initialization error:', error);
        showToast('Error connecting to database');
      }
    }

    init();
  </script>
</body>
</html>
