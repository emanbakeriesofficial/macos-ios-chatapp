<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Apple Chat">
  <meta name="theme-color" content="#F5F5F7">
  <title>Apple Chat</title>
  
  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23007AFF'/><path d='M90 40c-8 0-15 3-20 8-4-5-11-8-19-8-14 0-26 12-26 27 0 18 16 33 45 58 29-25 45-40 45-58 0-15-12-27-26-27z' fill='white'/></svg>">
  
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --apple-blue: #007AFF;
      --apple-gray: #F5F5F7;
      --apple-dark: #1D1D1F;
      --apple-border: #D2D2D7;
      --bubble-sent: #007AFF;
      --bubble-received: #E9E9EB;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--apple-gray);
      color: var(--apple-dark);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Apple Logo Background */
    #apple-logo-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw;
      height: 60vw;
      max-width: 500px;
      max-height: 500px;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.3s ease, transform 0.1s ease;
      will-change: transform;
    }

    #apple-logo-bg.glow {
      opacity: 0.08;
      filter: drop-shadow(0 0 30px rgba(0, 122, 255, 0.3));
    }

    /* Main Container */
    #app {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
      box-shadow: var(--shadow);
    }

    /* Header */
    header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--apple-border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .device-badge {
      display: inline-block;
      padding: 4px 10px;
      background: var(--apple-blue);
      color: white;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--apple-gray);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      transform-style: preserve-3d;
    }

    .icon-btn:hover {
      background: var(--apple-border);
      transform: translateY(-2px) rotateX(5deg);
      box-shadow: var(--shadow-hover);
    }

    .icon-btn:active {
      transform: translateY(0) scale(0.95);
    }

    /* Project Selector */
    #project-selector {
      padding: 16px 20px;
      background: var(--apple-gray);
      border-bottom: 1px solid var(--apple-border);
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    #project-selector::-webkit-scrollbar {
      display: none;
    }

    .project-chip {
      padding: 8px 16px;
      background: white;
      border: 1px solid var(--apple-border);
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      transform-style: preserve-3d;
    }

    .project-chip:hover {
      transform: translateY(-2px) rotateX(5deg);
      box-shadow: var(--shadow);
    }

    .project-chip.active {
      background: var(--apple-blue);
      color: white;
      border-color: var(--apple-blue);
    }

    .project-chip.add-new {
      background: var(--apple-blue);
      color: white;
      border-color: var(--apple-blue);
      font-weight: 600;
    }

    /* Chat Container */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* Message Bubble */
    .message {
      display: flex;
      gap: 8px;
      animation: messageSlideIn 0.3s ease;
      transform-style: preserve-3d;
      transition: transform 0.2s ease;
    }

    @keyframes messageSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message:hover {
      transform: translateY(-1px);
    }

    .message.sent {
      flex-direction: row-reverse;
    }

    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      position: relative;
      word-wrap: break-word;
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
    }

    .message.sent .message-bubble {
      background: var(--bubble-sent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.received .message-bubble {
      background: var(--bubble-received);
      color: var(--apple-dark);
      border-bottom-left-radius: 4px;
    }

    .message-bubble:hover {
      box-shadow: var(--shadow-hover);
      transform: scale(1.02);
    }

    .message-text {
      font-size: 15px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.7;
    }

    .copy-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .message:hover .copy-btn {
      opacity: 1;
    }

    .copy-btn:hover {
      background: rgba(0, 0, 0, 0.2);
      transform: scale(1.1);
    }

    .copy-btn:active {
      transform: scale(0.9);
    }

    /* Input Area */
    #input-area {
      padding: 16px 20px;
      background: white;
      border-top: 1px solid var(--apple-border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      border: 1px solid var(--apple-border);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      transition: all 0.2s ease;
    }

    #message-input:focus {
      outline: none;
      border-color: var(--apple-blue);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
    }

    #send-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--apple-blue);
      color: white;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      transform-style: preserve-3d;
    }

    #send-btn:hover:not(:disabled) {
      transform: translateY(-2px) rotateX(5deg);
      box-shadow: var(--shadow-hover);
    }

    #send-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: modalSlideUp 0.3s ease;
    }

    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .modal-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--apple-border);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      margin-bottom: 16px;
      transition: all 0.2s ease;
    }

    .modal-input:focus {
      outline: none;
      border-color: var(--apple-blue);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      transform-style: preserve-3d;
    }

    .modal-btn.primary {
      background: var(--apple-blue);
      color: white;
    }

    .modal-btn.secondary {
      background: var(--apple-gray);
      color: var(--apple-dark);
    }

    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .modal-btn:active {
      transform: scale(0.98);
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--apple-dark);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      z-index: 2000;
      opacity: 0;
      transition: all 0.3s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Loading State */
    .loading {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--apple-border);
      border-top-color: var(--apple-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Share Code Display */
    .share-code-display {
      background: var(--apple-gray);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      text-align: center;
    }

    .share-code-label {
      font-size: 12px;
      color: #86868B;
      margin-bottom: 4px;
    }

    .share-code-value {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--apple-blue);
      font-family: 'SF Mono', 'Monaco', monospace;
    }

    /* Responsive */
    @media (max-width: 600px) {
      #app {
        max-width: 100%;
      }

      .message-bubble {
        max-width: 85%;
      }

      .modal-content {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Apple Logo Background -->
  <svg id="apple-logo-bg" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
    <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z" fill="currentColor"/>
  </svg>

  <div id="app">
    <header>
      <div class="header-left">
        <div class="header-title">Messages</div>
        <span class="device-badge" id="device-badge">Loading...</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="share-btn" title="Share Project">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
        </button>
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v6m0 6v6m9-9h-6m-6 0H3"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="project-selector">
      <div class="project-chip add-new" id="add-project-btn">+ New Project</div>
    </div>

    <div id="chat-container">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>

    <div id="input-area">
      <textarea id="message-input" placeholder="Message" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- New Project Modal -->
  <div class="modal" id="new-project-modal">
    <div class="modal-content">
      <div class="modal-title">New Project</div>
      <input type="text" class="modal-input" id="project-name-input" placeholder="Project name" maxlength="50">
      <div class="modal-actions">
        <button class="modal-btn secondary" id="cancel-project-btn">Cancel</button>
        <button class="modal-btn primary" id="create-project-btn">Create</button>
      </div>
    </div>
  </div>

  <!-- Join Project Modal -->
  <div class="modal" id="join-project-modal">
    <div class="modal-content">
      <div class="modal-title">Join Project</div>
      <input type="text" class="modal-input" id="share-code-input" placeholder="Enter 6-digit code" maxlength="6">
      <div class="modal-actions">
        <button class="modal-btn secondary" id="cancel-join-btn">Cancel</button>
        <button class="modal-btn primary" id="join-project-btn">Join</button>
      </div>
    </div>
  </div>

  <!-- Share Project Modal -->
  <div class="modal" id="share-project-modal">
    <div class="modal-content">
      <div class="modal-title">Share Project</div>
      <div class="share-code-display">
        <div class="share-code-label">Share this code:</div>
        <div class="share-code-value" id="share-code-value">------</div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="close-share-btn">Close</button>
        <button class="modal-btn primary" id="copy-code-btn">Copy Code</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    // ============================================
    // CONFIGURATION - Replace with your Supabase credentials
    // ============================================
    const SUPABASE_URL = 'https://uwqoqbpbftdvxoyuvqjx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3cW9xYnBiZnRkdnhveXV2cWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDgyMDUsImV4cCI6MjA4ODEyNDIwNX0.4NXQZM7-mfdZ7Suq3VhjFbx1-CZBMLGGwd6JooqckDE';

    // Initialize Supabase client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================
    // STATE MANAGEMENT
    // ============================================
    let currentUser = null;
    let currentProject = null;
    let projects = [];
    let messages = [];
    let messageSubscription = null;

    // ============================================
    // DEVICE DETECTION
    // ============================================
    function detectDevice() {
      const ua = navigator.userAgent;
      const isIOS = /iPhone|iPad|iPod/.test(ua);
      const isMac = /Macintosh|MacIntel/.test(ua);
      
      if (isIOS) return 'ios_user';
      if (isMac) return 'macos_user';
      return 'macos_user'; // default
    }

    function getDeviceId() {
      let deviceId = localStorage.getItem('device_id');
      if (!deviceId) {
        deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
        localStorage.setItem('device_id', deviceId);
      }
      return deviceId;
    }

    // ============================================
    // UI HELPERS
    // ============================================
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function showModal(modalId) {
      document.getElementById(modalId).classList.add('active');
    }

    function hideModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
    }

    function generateShareCode() {
      return Math.random().toString(36).substr(2, 6).toUpperCase();
    }

    // ============================================
    // APPLE LOGO EFFECTS
    // ============================================
    function initAppleLogoEffects() {
      const logo = document.getElementById('apple-logo-bg');
      const chatContainer = document.getElementById('chat-container');

      // Parallax scroll effect
      chatContainer.addEventListener('scroll', () => {
        const scrollPercent = chatContainer.scrollTop / (chatContainer.scrollHeight - chatContainer.clientHeight);
        const translateY = scrollPercent * 20;
        logo.style.transform = `translate(-50%, calc(-50% + ${translateY}px))`;
      });

      // 3D tilt on hover
      document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 10;
        const y = (e.clientY / window.innerHeight - 0.5) * 10;
        logo.style.transform = `translate(-50%, -50%) rotateY(${x}deg) rotateX(${-y}deg)`;
      });
    }

    function glowLogo() {
      const logo = document.getElementById('apple-logo-bg');
      logo.classList.add('glow');
      setTimeout(() => logo.classList.remove('glow'), 1000);
    }

    // ============================================
    // DATABASE OPERATIONS
    // ============================================
    async function initUser() {
      const deviceId = getDeviceId();
      const deviceType = detectDevice();

      // Check if user exists
      const { data: existingUser } = await supabase
        .from('users')
        .select('*')
        .eq('device_id', deviceId)
        .single();

      if (existingUser) {
        currentUser = existingUser;
      } else {
        // Create new user
        const { data: newUser, error } = await supabase
          .from('users')
          .insert([{ device_id: deviceId, device_type: deviceType }])
          .select()
          .single();

        if (error) {
          console.error('Error creating user:', error);
          showToast('Error initializing user');
          return;
        }
        currentUser = newUser;
      }

      // Update UI
      document.getElementById('device-badge').textContent = deviceType === 'ios_user' ? 'iOS' : 'macOS';
    }

    async function loadProjects() {
      const { data, error } = await supabase
        .from('projects')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error loading projects:', error);
        return;
      }

      projects = data || [];
      renderProjects();

      // Auto-select last project or first project
      const lastProjectId = localStorage.getItem('last_project_id');
      if (lastProjectId && projects.find(p => p.id === lastProjectId)) {
        selectProject(lastProjectId);
      } else if (projects.length > 0) {
        selectProject(projects[0].id);
      }
    }

    function renderProjects() {
      const container = document.getElementById('project-selector');
      const addBtn = document.getElementById('add-project-btn');
      
      // Clear existing project chips (except add button)
      const chips = container.querySelectorAll('.project-chip:not(.add-new)');
      chips.forEach(chip => chip.remove());

      // Add project chips
      projects.forEach(project => {
        const chip = document.createElement('div');
        chip.className = 'project-chip';
        chip.textContent = project.name;
        chip.dataset.projectId = project.id;
        chip.addEventListener('click', () => selectProject(project.id));
        container.insertBefore(chip, addBtn);
      });
    }

    async function createProject(name) {
      if (!name || name.trim().length === 0) {
        showToast('Project name cannot be empty');
        return;
      }

      const shareCode = generateShareCode();

      const { data, error } = await supabase
        .from('projects')
        .insert([{
          name: name.trim(),
          user_id: currentUser.id,
          share_code: shareCode
        }])
        .select()
        .single();

      if (error) {
        console.error('Error creating project:', error);
        showToast('Error creating project');
        return;
      }

      projects.unshift(data);
      renderProjects();
      selectProject(data.id);
      showToast('Project created!');
    }

    async function joinProject(shareCode) {
      if (!shareCode || shareCode.trim().length !== 6) {
        showToast('Invalid share code');
        return;
      }

      // Find project by share code
      const { data: project, error: findError } = await supabase
        .from('projects')
        .select('*')
        .eq('share_code', shareCode.toUpperCase())
        .single();

      if (findError || !project) {
        showToast('Project not found');
        return;
      }

      // Check if already joined
      const alreadyJoined = projects.find(p => p.id === project.id);
      if (alreadyJoined) {
        showToast('Already in this project');
        selectProject(project.id);
        return;
      }

      // Add user to project (create a new project entry for this user)
      const { data: newProject, error: joinError } = await supabase
        .from('projects')
        .insert([{
          name: project.name,
          user_id: currentUser.id,
          share_code: project.share_code
        }])
        .select()
        .single();

      if (joinError) {
        console.error('Error joining project:', joinError);
        showToast('Error joining project');
        return;
      }

      projects.unshift(newProject);
      renderProjects();
      selectProject(newProject.id);
      showToast('Joined project!');
    }

    async function selectProject(projectId) {
      currentProject = projects.find(p => p.id === projectId);
      if (!currentProject) return;

      // Update UI
      document.querySelectorAll('.project-chip').forEach(chip => {
        chip.classList.toggle('active', chip.dataset.projectId === projectId);
      });

      // Save to localStorage
      localStorage.setItem('last_project_id', projectId);

      // Unsubscribe from previous project
      if (messageSubscription) {
        messageSubscription.unsubscribe();
      }

      // Load messages
      await loadMessages();

      // Subscribe to real-time updates
      subscribeToMessages();
    }

    async function loadMessages() {
      const chatContainer = document.getElementById('chat-container');
      chatContainer.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .eq('share_code', currentProject.share_code)
        .order('created_at', { ascending: true });

      if (error) {
        console.error('Error loading messages:', error);
        chatContainer.innerHTML = '<p style="text-align: center; color: #86868B;">Error loading messages</p>';
        return;
      }

      messages = data || [];
      renderMessages();
    }

    function renderMessages() {
      const chatContainer = document.getElementById('chat-container');
      chatContainer.innerHTML = '';

      if (messages.length === 0) {
        chatContainer.innerHTML = '<p style="text-align: center; color: #86868B; padding: 40px 20px;">No messages yet. Start the conversation!</p>';
        return;
      }

      messages.forEach(msg => {
        const messageEl = createMessageElement(msg);
        chatContainer.appendChild(messageEl);
      });

      scrollToBottom();
    }

    function createMessageElement(msg) {
      const isSent = msg.user_id === currentUser.id;
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';

      const text = document.createElement('div');
      text.className = 'message-text';
      text.textContent = msg.content;

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      
      const time = new Date(msg.created_at).toLocaleTimeString('en-US', { 
        hour: 'numeric', 
        minute: '2-digit' 
      });
      meta.textContent = time;

      bubble.appendChild(text);
      bubble.appendChild(meta);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(msg.content);
        showToast('Copied!');
      });

      messageDiv.appendChild(bubble);
      messageDiv.appendChild(copyBtn);

      return messageDiv;
    }

    function subscribeToMessages() {
      messageSubscription = supabase
        .channel(`messages:${currentProject.share_code}`)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: `share_code=eq.${currentProject.share_code}`
        }, (payload) => {
          const newMessage = payload.new;
          messages.push(newMessage);
          
          const chatContainer = document.getElementById('chat-container');
          const messageEl = createMessageElement(newMessage);
          chatContainer.appendChild(messageEl);
          
          scrollToBottom();
          glowLogo();
        })
        .subscribe();
    }

    async function sendMessage(content) {
      if (!content || content.trim().length === 0) return;
      if (!currentProject) {
        showToast('Please select a project first');
        return;
      }

      const { error } = await supabase
        .from('messages')
        .insert([{
          content: content.trim(),
          user_id: currentUser.id,
          share_code: currentProject.share_code
        }]);

      if (error) {
        console.error('Error sending message:', error);
        showToast('Error sending message');
        return;
      }

      // Clear input
      document.getElementById('message-input').value = '';
      updateSendButton();
    }

    function scrollToBottom() {
      const chatContainer = document.getElementById('chat-container');
      const isNearBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < 100;
      
      if (isNearBottom || messages.length === 1) {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================
    function updateSendButton() {
      const input = document.getElementById('message-input');
      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = input.value.trim().length === 0;
    }

    document.getElementById('message-input').addEventListener('input', (e) => {
      updateSendButton();
      
      // Auto-resize textarea
      e.target.style.height = 'auto';
      e.target.style.height = e.target.scrollHeight + 'px';
    });

    document.getElementById('message-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const content = e.target.value;
        if (content.trim().length > 0) {
          sendMessage(content);
        }
      }
    });

    document.getElementById('send-btn').addEventListener('click', () => {
      const content = document.getElementById('message-input').value;
      sendMessage(content);
    });

    document.getElementById('add-project-btn').addEventListener('click', () => {
      showModal('new-project-modal');
      document.getElementById('project-name-input').focus();
    });

    document.getElementById('cancel-project-btn').addEventListener('click', () => {
      hideModal('new-project-modal');
      document.getElementById('project-name-input').value = '';
    });

    document.getElementById('create-project-btn').addEventListener('click', () => {
      const name = document.getElementById('project-name-input').value;
      createProject(name);
      hideModal('new-project-modal');
      document.getElementById('project-name-input').value = '';
    });

    document.getElementById('settings-btn').addEventListener('click', () => {
      showModal('join-project-modal');
      document.getElementById('share-code-input').focus();
    });

    document.getElementById('cancel-join-btn').addEventListener('click', () => {
      hideModal('join-project-modal');
      document.getElementById('share-code-input').value = '';
    });

    document.getElementById('join-project-btn').addEventListener('click', () => {
      const code = document.getElementById('share-code-input').value;
      joinProject(code);
      hideModal('join-project-modal');
      document.getElementById('share-code-input').value = '';
    });

    document.getElementById('share-btn').addEventListener('click', () => {
      if (!currentProject) {
        showToast('Please select a project first');
        return;
      }
      document.getElementById('share-code-value').textContent = currentProject.share_code;
      showModal('share-project-modal');
    });

    document.getElementById('close-share-btn').addEventListener('click', () => {
      hideModal('share-project-modal');
    });

    document.getElementById('copy-code-btn').addEventListener('click', () => {
      const code = currentProject.share_code;
      navigator.clipboard.writeText(code);
      showToast('Code copied!');
    });

    // Close modals on background click
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          hideModal(modal.id);
        }
      });
    });

    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() {
      try {
        await initUser();
        await loadProjects();
        initAppleLogoEffects();
      } catch (error) {
        console.error('Initialization error:', error);
        showToast('Error initializing app');
      }
    }

    // Start the app
    init();
  </script>
</body>
</html>
